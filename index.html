<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="container">

<div class="left">
<div class="logo-bar">
    <img src="Yoodo.jpg" alt="Yoodo logo">
    <h1>ODIN</h1>
</div>
<p class="text">All Rights Reserved to Greatest Adventure</p>
</div>

<div class="right">
      <div class="form-text">
      <h2>This is my first time doing this please have a look</h2>
      <p>Please fill in this form to create an account</p>
      </div>
      <div class="layer1">
          <div class="layer2">
            <form action="#" method="get">
            <div class="row">

            <div class="field">
                  <label for="First Name">First Name</label>
                  <input type="First Name" id="First Name" name="First Name">
            </div>
  

            <div class="field">
                  <label for="Last Name">Last Name</label>
                  <input type="Last Name" id="Last Name" name="Last Name">
            </div>
      </div> 


      <div class="row">

      <div class="field">
                  <label for="Email">Email</label>
                  <input type="Email" id="Email" name="Email">
            </div>
  

      <div class="field">
                  <label for="Phone Number">Phone Number</label>
                  <input type="Phone Number" id="Phone Number" name="Phone Number">
            </div>
      </div> 


      <div class="row">

      <div class="field">
                  <label for="Password">Password</label>
                  <input type="Password" id="Password" name="Password">
            </div>
  

      <div class="field">
                  <label for="Confirm Password">Confirm Password</label>
                  <input type="Confirm Password" id="Confirm Password" name="Confirm Password">
            </div>
      </div> 


  <div>
    <button type="Create Account">Create Account</button>
    <p>Already have an account? <a href="#">Log in</a></p>

  </div>




</form>
</div>
</div>
</div>

</div>
</body>
</html>
